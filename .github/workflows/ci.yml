name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build --tag devagent-local .

      - name: Run unit and integration tests
        run: docker run --rm devagent-local python -m unittest discover -s tests -v
